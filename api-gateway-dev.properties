server.port=8080
spring.application.name=api-gateway

# Gateway Routes Configuration
spring.cloud.gateway.routes[0].id=payment-service
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/payments/**

spring.cloud.gateway.routes[1].id=fraud-service
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/fraud/**

spring.cloud.gateway.routes[2].id=notification-service
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/notifications/**

# Security Configuration
jwt.secret=${JWT_SECRET:your-super-secret-key-min-256-bits-long-change-in-production}
jwt.expiration=3600000
request.signing.secret=${REQUEST_SIGNING_SECRET:your-request-signing-secret-change-in-production}

# Gateway Timeouts
gateway.request.timeout-ms=30000
gateway.circuit.breaker.timeout-ms=10000

# Rate Limiting
gateway.rate.limit.enabled=false
gateway.rate.limit.requests.per.minute=1000
gateway.rate.limit.requests.per.user.per.minute=100

# Logging
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.com.payment.gateway=DEBUG
logging.level.AUDIT=INFO

# Management
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.metrics.tags.service=${spring.application.name}


