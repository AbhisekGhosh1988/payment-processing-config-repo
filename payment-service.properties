
server.port=8081
spring.application.name=payment-service

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/payments
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=payment-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.max-poll-records=100
spring.kafka.consumer.max-poll-interval-ms=300000
spring.kafka.producer.retries=3
spring.kafka.producer.acks=all
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.payment.common.dto
spring.kafka.consumer.properties.spring.json.use.type.headers=true
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=true
spring.kafka.producer.properties.linger.ms=20
spring.kafka.producer.properties.batch.size=32768
spring.kafka.producer.properties.compression.type=lz4

# Kafka Topics Configuration
kafka.topics.payment-initiated=payment.initiated
kafka.topics.fraud-checked=fraud.checked
kafka.topics.payment-processed=payment.processed
kafka.topics.payment-failed=payment.failed
kafka.topics.payment-retry-1=payment.retry.1
kafka.topics.payment-retry-2=payment.retry.2
kafka.topics.payment-retry-3=payment.retry.3
kafka.topics.payment-dlq=payment.dlq

# Outbox Configuration
outbox.publisher.batch-size=100
outbox.publisher.fixed-delay-ms=5000
outbox.publisher.processing-lease-seconds=300
outbox.archive.sent-retention-days=7
outbox.archive.cron=0 0 * * * *

# External Bank Service
external.bank.url=http://bank-api.example.com
external.bank.timeout-ms=1500
external.bank.retry-attempts=3
external.bank.circuit-breaker.failure-rate-threshold=50
external.bank.circuit-breaker.minimum-number-of-calls=5
external.bank.circuit-breaker.sliding-window-size=10
external.bank.circuit-breaker.wait-duration-in-open-state=10s

# Payment Processing Thresholds
payment.max.amount=100000.00
payment.min.amount=0.01
payment.daily.limit.per.user=50000.00
payment.hourly.limit.per.user=10000.00
payment.max.retry.attempts=3

# Observability Alerts
observability.alerts.outbox-oldest-new-age-seconds=300
observability.alerts.outbox-failed-count=1
observability.alerts.payment-processing-timeout-seconds=60

# Logging
logging.level.root=INFO
logging.level.com.payment=DEBUG
logging.level.AUDIT=INFO

# Management
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.metrics.tags.service=${spring.application.name}

# Security
jwt.secret=${JWT_SECRET:your-super-secret-key-min-256-bits-long-change-in-production}
jwt.expiration=3600000
request.signing.secret=${REQUEST_SIGNING_SECRET:your-request-signing-secret-change-in-production}

# Resilience
resilience4j.circuitbreaker.instances.bankAuthorization.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.bankAuthorization.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.bankAuthorization.sliding-window-size=10
resilience4j.circuitbreaker.instances.bankAuthorization.wait-duration-in-open-state=10s
resilience4j.retry.instances.bankAuthorization.max-attempts=3
resilience4j.retry.instances.bankAuthorization.wait-duration=200ms
resilience4j.retry.instances.bankAuthorization.retry-exceptions[0]=com.payment.external.ExternalServiceException
resilience4j.bulkhead.instances.bankAuthorization.max-concurrent-calls=20
resilience4j.bulkhead.instances.bankAuthorization.max-wait-duration=0

