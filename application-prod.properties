
# Production Environment Overrides
logging.level.root=WARN
logging.level.com.payment=INFO
logging.level.AUDIT=INFO
logging.level.org.springframework.cloud=WARN

# Production Services (Cluster)
spring.kafka.bootstrap-servers=kafka-1.example.com:9092,kafka-2.example.com:9092,kafka-3.example.com:9092
spring.kafka.producer.acks=all
spring.kafka.producer.retries=10
spring.kafka.consumer.max-poll-interval-ms=600000

# Production Database (HA)
spring.datasource.url=jdbc:postgresql://postgres-prod.example.com:5432/payments
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.connection-timeout=15000

# External Bank Service (Production)
external.bank.url=https://api.bank.com
external.bank.timeout-ms=2000
external.bank.circuit-breaker.failure-rate-threshold=30

# Feature Toggles for Production
feature.circuit.breaker.enabled=true
feature.rate.limiting.enabled=true
feature.cache.enabled=true
feature.fraud.detection.enabled=true
feature.notification.async.enabled=true
feature.payment.retry.enabled=true
feature.debug.logging.enabled=false
feature.mock.external.services=false

# Performance Tuning
kafka.producer.batch.size=131072
kafka.producer.linger.ms=100
spring.datasource.hikari.auto-commit=true
outbox.publisher.batch-size=500
outbox.publisher.fixed-delay-ms=2000

# Monitoring
management.tracing.sampling.probability=0.1
management.metrics.export.prometheus.enabled=true

# Production Topics
kafka.topics.payment-initiated=payment.initiated.prod
kafka.topics.fraud-checked=fraud.checked.prod
kafka.topics.payment-processed=payment.processed.prod

# Alerts (stricter thresholds)
observability.alerts.outbox-oldest-new-age-seconds=300
observability.alerts.outbox-failed-count=1
observability.alerts.payment-processing-timeout-seconds=30

# Rate Limiting Configuration (enabled in prod)
gateway.rate.limit.enabled=true
gateway.rate.limit.requests.per.minute=5000
gateway.rate.limit.requests.per.user.per.minute=500

# Caching for performance
fraud.cache.enabled=true
fraud.cache.ttl.minutes=120
fraud.cache.max.size=50000

