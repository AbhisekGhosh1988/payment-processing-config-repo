

# Logging
logging.level.root=INFO
logging.level.com.payment=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{traceId}] %-5level %logger - %msg%n

# Management
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0

# Feature Toggles
feature.jwt.enabled=true
feature.rbac.enabled=true
feature.audit.enabled=true
feature.fraud.detection.enabled=true
feature.notification.async.enabled=true
feature.payment.retry.enabled=true
feature.circuit.breaker.enabled=true
feature.rate.limiting.enabled=false
feature.cache.enabled=false
feature.mock.external.services=false
feature.debug.logging.enabled=false

