
# Development Environment Overrides
logging.level.root=DEBUG
logging.level.com.payment=DEBUG
logging.level.org.springframework.cloud=DEBUG
logging.level.org.springframework.kafka=DEBUG

# Local Services
spring.kafka.bootstrap-servers=localhost:9092
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2

# Feature Toggles for Development
feature.mock.external.services=true
feature.debug.logging.enabled=true
feature.performance.metrics.enabled=true
feature.rate.limiting.enabled=false

# Longer Timeouts (for debugging)
external.bank.timeout-ms=5000
fraud.analysis.timeout-ms=5000
gateway.request.timeout-ms=60000

# Development Secrets (NOT FOR PRODUCTION)
jwt.secret=dev-secret-key-min-256-bits-long-for-local-testing-only-12345
request.signing.secret=dev-signing-secret-for-local-testing-only

# External Bank Service (Mock)
external.bank.url=http://localhost:9000/bank

# Kafka Topics (Local)
kafka.topics.payment-initiated=payment.initiated.dev
kafka.topics.fraud-checked=fraud.checked.dev
kafka.topics.payment-processed=payment.processed.dev

