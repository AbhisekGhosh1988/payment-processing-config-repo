
server.port=8083
spring.application.name=notification-service

# Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/notifications
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.payment.common.dto
spring.kafka.consumer.properties.spring.json.use.type.headers=true

# Email Notification Configuration
notification.email.enabled=true
notification.email.from=noreply@payment-system.com
notification.email.smtp.host=${EMAIL_SMTP_HOST:smtp.gmail.com}
notification.email.smtp.port=${EMAIL_SMTP_PORT:587}
notification.email.smtp.user=${EMAIL_SMTP_USER:your-email@gmail.com}
notification.email.smtp.password=${EMAIL_SMTP_PASSWORD:your-password}

# SMS Notification Configuration
notification.sms.enabled=false
notification.sms.provider=twilio
notification.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
notification.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}

# Push Notification Configuration
notification.push.enabled=false
notification.push.provider=firebase
notification.push.firebase.key=${FIREBASE_KEY:}

# Retry Configuration
notification.retry.max-attempts=3
notification.retry.initial-delay-ms=1000
notification.retry.backoff-multiplier=2.0
notification.dlq.enabled=true

# Logging
logging.level.root=INFO
logging.level.com.payment=DEBUG

# Management
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.tracing.sampling.probability=1.0
management.metrics.tags.service=${spring.application.name}

# Security
jwt.secret=${JWT_SECRET:your-super-secret-key-min-256-bits-long-change-in-production}
jwt.expiration=3600000
request.signing.secret=${REQUEST_SIGNING_SECRET:your-request-signing-secret-change-in-production}

